name: Build CompanyEdgeLauncher

on:
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: python -m pip install --upgrade pip -r scripts/company-edge-gui/requirements-build.txt

      - name: Build CompanyEdgeLauncher.exe
        run: |
          python -m PyInstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name CompanyEdgeLauncher `
            --distpath dist-launcher `
            --workpath scripts/company-edge-gui/build `
            --specpath scripts/company-edge-gui `
            --paths scripts/company-edge-gui `
            --hidden-import edge_agent `
            --hidden-import edge_ws `
            --hidden-import camera_panel `
            --collect-all socketio `
            --collect-all engineio `
            scripts/company-edge-gui/app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: CompanyEdgeLauncher-exe
          path: dist-launcher/CompanyEdgeLauncher.exe
          if-no-files-found: error
